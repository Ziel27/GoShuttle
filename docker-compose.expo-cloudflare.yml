version: '3.9'

services:
  expo-lan:
    build:
      context: .
      dockerfile: Dockerfile.expo-tunnel
    container_name: goshuttle-expo-lan
    restart: unless-stopped
    command: ["pm2-runtime", "ecosystem.expo-lan.config.js"]
    environment:
      - EXPO_NO_TELEMETRY=1
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    expose:
      - "8081"
    networks:
      - expo-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: goshuttle-expo-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - expo-lan
    networks:
      - expo-net

networks:
  expo-net:
