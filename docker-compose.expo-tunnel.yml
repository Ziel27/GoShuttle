version: '3.9'

services:
  expo-tunnel:
    build:
      context: .
      dockerfile: Dockerfile.expo-tunnel
    container_name: goshuttle-expo-tunnel
    restart: unless-stopped
    environment:
      - CI=1
      - EXPO_NO_TELEMETRY=1
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    ports:
      - "8081:8081"
