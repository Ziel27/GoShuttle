version: '3.9'

services:
  expo-tunnel:
    build:
      context: .
      dockerfile: Dockerfile.expo-tunnel
    container_name: goshuttle-expo-tunnel
    restart: unless-stopped
    environment:
      - EXPO_NO_TELEMETRY=1
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL:-https://api.goshuttle.app/api}
      - EXPO_PUBLIC_SOCKET_URL=${EXPO_PUBLIC_SOCKET_URL:-https://api.goshuttle.app}
      # Optional but recommended to reduce ngrok tunnel failures/rate limits.
      # Set this in Portainer environment variables if you have one.
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    ports:
      - "8081:8081"
