version: '3.9'

services:
  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: goshuttle-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_RESET_SECRET: ${JWT_RESET_SECRET:-}
      MONGO_URI: ${MONGO_URI}
      MONGODB_MAX_POOL_SIZE: ${MONGODB_MAX_POOL_SIZE:-10}
      MONGODB_MIN_POOL_SIZE: ${MONGODB_MIN_POOL_SIZE:-2}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://admin.goshuttle.app}
      ALLOW_OPEN_BOUNDARY: ${ALLOW_OPEN_BOUNDARY:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SOCKET_PING_INTERVAL: ${SOCKET_PING_INTERVAL:-25000}
      SOCKET_PING_TIMEOUT: ${SOCKET_PING_TIMEOUT:-60000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GEOFENCE_CACHE_TTL: ${GEOFENCE_CACHE_TTL:-300000}
    ports:
      - "5000:5000"
    networks:
      - proxy

  # Admin Web Dashboard
  admin-web:
    build:
      context: .
      dockerfile: Dockerfile.admin-web
      args:
        - VITE_ADMIN_API_URL=https://api.goshuttle.app/api
        - VITE_ADMIN_SOCKET_URL=https://api.goshuttle.app
    container_name: goshuttle-admin-web
    restart: unless-stopped
    environment:
      - VITE_ADMIN_API_URL=https://api.goshuttle.app/api
      - VITE_ADMIN_SOCKET_URL=https://api.goshuttle.app
    expose:
      - "3001"
    networks:
      - proxy

  # Simple reverse proxy used by the Cloudflare tunnel to route hostnames
  caddy:
    image: caddy:2-alpine
    container_name: goshuttle-caddy
    restart: unless-stopped
    # NOTE: Caddyfile is embedded inline via Docker configs (no bind-mount needed).
    # This makes the stack fully self-contained and deployable from Portainer's
    # web editor without requiring a Git repository clone.
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    depends_on:
      - admin-web
      - backend
    ports:
      - "80:80"
    networks:
      - proxy

networks:
  proxy:
    external: true

# The Caddyfile is embedded here so this compose file is fully self-contained.
# Portainer's web editor does not copy files alongside the compose YAML,
# so a bind-mount (./Caddyfile) would fail. This approach works everywhere.
configs:
  caddyfile:
    content: |
      # http:// prefix disables Caddy's automatic TLS (Let's Encrypt).
      # SSL is already terminated by Cloudflare Tunnel — Caddy only needs
      # to proxy plain HTTP internally between containers.
      http://admin.goshuttle.app {
          reverse_proxy admin-web:3001
      }

      http://api.goshuttle.app {
          reverse_proxy backend:5000
      }
