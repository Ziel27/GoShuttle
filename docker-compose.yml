version: '3.9'

services:
  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: goshuttle-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_RESET_SECRET: ${JWT_RESET_SECRET:-}
      MONGO_URI: ${MONGO_URI}
      MONGODB_MAX_POOL_SIZE: ${MONGODB_MAX_POOL_SIZE:-10}
      MONGODB_MIN_POOL_SIZE: ${MONGODB_MIN_POOL_SIZE:-2}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://admin.goshuttle.app}
      ALLOW_OPEN_BOUNDARY: ${ALLOW_OPEN_BOUNDARY:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SOCKET_PING_INTERVAL: ${SOCKET_PING_INTERVAL:-25000}
      SOCKET_PING_TIMEOUT: ${SOCKET_PING_TIMEOUT:-60000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GEOFENCE_CACHE_TTL: ${GEOFENCE_CACHE_TTL:-300000}
      WEB_BASE_URL: ${WEB_BASE_URL:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "5000:5000"
    networks:
      - proxy

  # Admin Web Dashboard
  admin-web:
    build:
      context: .
      dockerfile: Dockerfile.admin-web
      args:
        - VITE_ADMIN_API_URL=https://api.goshuttle.app/api
        - VITE_ADMIN_SOCKET_URL=https://api.goshuttle.app
    container_name: goshuttle-admin-web
    restart: unless-stopped
    environment:
      - VITE_ADMIN_API_URL=https://api.goshuttle.app/api
      - VITE_ADMIN_SOCKET_URL=https://api.goshuttle.app
    expose:
      - "3001"
    networks:
      - proxy



networks:
  proxy:
    external: true
