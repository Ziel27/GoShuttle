version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:8
    container_name: goshuttle-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: goshuttle
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - goshuttle-network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh -u admin -p changeme --authenticationDatabase admin localhost:27017/goshuttle
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: goshuttle-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_RESET_SECRET: ${JWT_RESET_SECRET:-your-super-secret-reset-key-change-in-production}
      MONGO_URI: mongodb://admin:changeme@mongodb:27017/goshuttle?authSource=admin
      MONGODB_MAX_POOL_SIZE: 10
      MONGODB_MIN_POOL_SIZE: 2
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:3001}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@goshuttle.com}
      SOCKET_PING_INTERVAL: 25000
      SOCKET_PING_TIMEOUT: 60000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GEOFENCE_CACHE_TTL: 300000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - goshuttle-network
    volumes:
      - ./backend/src:/app/backend/src

  # Admin Web Dashboard
  admin-web:
    build:
      context: .
      dockerfile: Dockerfile.admin-web
    container_name: goshuttle-admin-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - goshuttle-network

  # Redis for caching (optional - can be added later for geofence cache)
  redis:
    image: redis:7-alpine
    container_name: goshuttle-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - goshuttle-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:

networks:
  goshuttle-network:
    driver: bridge
